<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="author" content="{{ site.author.name | escape }}">

    <title>{% if page.title and page.title != "Home" %}{{ page.title | escape }} · {% endif %}{{ site.title | escape }} ({{ site.korean_name }})</title>
    <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">

    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="{{ site.title | escape }}">
    <meta property="og:title" content="{{ site.title | escape }} ({{ site.korean_name }})">
    <meta property="og:description" content="{{ site.description | escape }}">
    <meta property="og:url" content="{{ page.url | replace: 'index.html', '' | absolute_url }}">

    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#17324d">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include header.html %}
    <main id="main-content" class="page-shell">
      {{ content }}
    </main>
    {% include footer.html %}
  </body>
</html>
